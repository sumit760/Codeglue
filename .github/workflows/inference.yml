# .github/workflows/inference.yml
name: Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: 'Text to classify'
        required: true

env:
  # Docker Hub image to pull. Replace with your own:
  #   <your-dockerhub-username>/mlops-a3-inference:latest
  # (Docker Hub is the default registry, so no docker.io/ prefix is required.)
  IMAGE: sumitiitj26/mlops-a3-inference:dev-latest

jobs:
  infer:
    runs-on: ubuntu-latest
    steps:
      # Uncomment ONLY if the image is PRIVATE on Docker Hub.
      # Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets.
      # - name: Log in to Docker Hub
      #   env:
      #     DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      #     DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      #   run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Pull image from Docker Hub
        run: docker pull "$IMAGE"

      # HF_TOKEN and INPUT_TEXT are set as step env vars and forwarded with
      # `-e NAME` (value-less pass-through), so nothing user-controlled is
      # interpolated into the command line.
      - name: Run inference
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
        run: |
          docker run --rm \
            -e HF_TOKEN \
            -e INPUT_TEXT \
            "$IMAGE"
