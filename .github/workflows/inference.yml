# .github/workflows/inference.yml
name: Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: 'Text to classify'
        required: true

env:
  # The image you signed in CI. Use the tag that points at the signed build
  # (e.g. the commit SHA tag). Replace with your Docker Hub repo.
  IMAGE: sumitiitj26/mlops-a3-inference:dev-latest

jobs:
  infer:
    name: Infer vulnerability of the codeline
    runs-on: ubuntu-latest
    
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Uncomment ONLY if the image (and thus its signature) is PRIVATE on Docker Hub.
      # - name: Log in to Docker Hub
      #   env:
      #     DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      #     DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      #   run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      # Pull, then resolve to an immutable digest so verify and run use the SAME image.
      - name: Pull image and resolve digest
        run: |
          docker pull "$IMAGE"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")"
          echo "DIGEST=$DIGEST" >> "$GITHUB_ENV"
          echo "Resolved $IMAGE -> $DIGEST"

      # Keyless verification. Fails the job (non-zero exit) if the signature,
      # identity, or issuer don't match — so inference never runs on an
      # unverified image.
      - name: Verify signature (keyless / GitHub OIDC)
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/\.github/workflows/.+" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$DIGEST"

      # Only reached if verification succeeded. Run the exact verified digest.
      - name: Run inference
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
        run: |
          docker run --rm \
            -e HF_TOKEN \
            -e INPUT_TEXT \
            "$DIGEST"
